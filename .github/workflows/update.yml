name: Update Syllabus Data
on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 18
      matrix:
        include:
          - faculty: "法学部"
          - faculty: "経済学部"
          - faculty: "経営学部"
          - faculty: "産業社会学部"
          - faculty: "国際関係学部"
          - faculty: "政策科学部"
          - faculty: "デザイン・アート学部"
          - faculty: "映像学部"
          - faculty: "総合心理学部"
          - faculty: "理工学部"
          - faculty: "グローバル教養学部"
          - faculty: "食マネジメント学部"
          - faculty: "情報理工学部"
          - faculty: "生命科学部"
          - faculty: "薬学部"
          - faculty: "スポーツ健康科学部"
          - faculty: "文学部"
            semester: "春学期"
          - faculty: "文学部"
            semester: "秋学期"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Scrape faculty data
        run: python scrape.py
        env:
          SCRAPE_YEAR: 2022
          SCRAPE_FACULTY: ${{ matrix.faculty }}
          SCRAPE_SEMESTER: ${{ matrix.semester || '' }}
          OUTPUT_DIR: data
      - name: Upload faculty data
        uses: actions/upload-artifact@v4
        with:
          # <LaTex> などのタグを削除し、変数の書き方を ${{ }} に統一します
          name: data-${{ matrix.faculty }}-${{ matrix.semester || 'all' }}
          path: data/
          retention-days: 1
  merge:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all faculty data
        uses: actions/download-artifact@v4
        with:
          path: data/
          pattern: data-*
          merge-multiple: true
      - name: List downloaded files
        run: ls -la data/
      - name: Merge faculty data
        run: python merge.py
        env:
          SCRAPE_YEAR: 2022
          OUTPUT_DIR: data
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          force_orphan: true
